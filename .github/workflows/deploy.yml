name: Deploy

on:

  push:

    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout

      uses: actions/checkout@v4

    - name: Setup Node

      uses: actions/setup-node@v4

      with:

        node-version: 20

    - name: Install Packages

      run: npm install

    - name: Run Tests

      run: npm test --if-present

    - name: Build

      run: echo "Build Complete"

    - name: Deploy

      uses: appleboy/ssh-action@v1

      with:

        host: ${{ secrets.HOST }}

        username: ${{ secrets.USERNAME }}

        key: ${{ secrets.SSH_KEY }}

        port: ${{ secrets.PORT }}

        script: |

          cd /root/my-node-project

          git pull

          docker compose down

          docker compose up -d --build